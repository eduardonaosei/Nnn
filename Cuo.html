<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Criador de Currículo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --gold: #f5c542;
  --gold-light: #ffd95e;
  --bg: #111;
  --card: #1c1c1c;
  --input: #2b2b2b;
  --border: #333;
  --text: #eee;
  --muted: #888;
}

body {
  background: var(--bg);
  color: var(--text);
  padding: 30px 20px;
  font-family: 'DM Sans', Arial, sans-serif;
  min-height: 100vh;
}

.container {
  max-width: 820px;
  margin: auto;
  background: var(--card);
  padding: 35px 30px;
  border-radius: 18px;
  border: 1px solid var(--border);
}

h1 {
  text-align: center;
  margin-bottom: 30px;
  color: var(--gold);
  font-family: 'DM Serif Display', serif;
  font-size: 2rem;
  letter-spacing: 1px;
}

.form-grid {
  display: grid;
  gap: 18px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}

@media (max-width: 560px) {
  .form-row { grid-template-columns: 1fr; }
}

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

label {
  font-weight: 500;
  font-size: 0.85rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

input, textarea {
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--input);
  color: var(--text);
  font-size: 15px;
  font-family: 'DM Sans', Arial, sans-serif;
  transition: border-color 0.2s;
}

input:focus, textarea:focus {
  outline: none;
  border-color: var(--gold);
}

input.invalid, textarea.invalid {
  border-color: #e05252;
}

textarea {
  resize: vertical;
  min-height: 90px;
}

.error-msg {
  font-size: 0.78rem;
  color: #e05252;
  display: none;
}

.field.has-error .error-msg { display: block; }
.field.has-error input,
.field.has-error textarea { border-color: #e05252; }

.btn-gerar {
  padding: 15px;
  background: var(--gold);
  border: none;
  border-radius: 10px;
  font-size: 17px;
  font-weight: 700;
  font-family: 'DM Sans', Arial, sans-serif;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  letter-spacing: 0.5px;
  margin-top: 5px;
}

.btn-gerar:hover { background: var(--gold-light); }
.btn-gerar:active { transform: scale(0.98); }

/* ── CURRÍCULO PREVIEW ── */
#curriculo {
  margin-top: 35px;
  background: #fff;
  color: #111;
  padding: 40px 35px;
  border-radius: 15px;
  display: none;
}

.cv-header {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 24px;
}

#previewFoto {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #111;
  flex-shrink: 0;
  display: none; /* esconde se não tiver foto — FIX */
}

.cv-header-info h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.7rem;
  color: #111;
  margin-bottom: 6px;
}

.cv-header-info p {
  font-size: 0.9rem;
  color: #444;
  line-height: 1.7;
}

.secao {
  margin-top: 22px;
}

.secao h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 1rem;
  color: #333;
  border-bottom: 2px solid var(--gold);
  padding-bottom: 5px;
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.secao p {
  font-size: 0.93rem;
  color: #333;
  line-height: 1.7;
  white-space: pre-wrap; /* FIX: preserva quebras de linha do textarea */
}

/* ── BOTÕES PÓS-GERAÇÃO ── */
.cv-actions {
  display: flex;
  gap: 12px;
  margin-top: 25px;
  flex-wrap: wrap;
}

.btn-acao {
  flex: 1;
  min-width: 140px;
  padding: 13px 20px;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  font-family: 'DM Sans', Arial, sans-serif;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
}

.btn-acao:active { transform: scale(0.97); }

.btn-imprimir {
  background: var(--gold);
  color: #111;
}

.btn-imprimir:hover { background: var(--gold-light); }

.btn-limpar {
  background: var(--input);
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-limpar:hover { background: #3a3a3a; }

/* print media query removido — impressão feita via nova janela */
</style>
</head>

<body>
<div class="container">
  <h1>CRIADOR DE CURRÍCULO</h1>

  <form id="formCurriculo" novalidate class="form-grid">

    <div class="field" id="field-foto">
      <label for="foto">Foto (opcional)</label>
      <input type="file" id="foto" accept="image/*">
    </div>

    <div class="form-row">
      <div class="field" id="field-nome">
        <label for="nome">Nome Completo *</label>
        <input type="text" id="nome" placeholder="Seu nome completo" autocomplete="name">
        <span class="error-msg">Nome é obrigatório.</span>
      </div>
      <div class="field" id="field-email">
        <label for="email">Email *</label>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
        <span class="error-msg">Informe um email válido.</span>
      </div>
    </div>

    <div class="form-row">
      <div class="field">
        <label for="telefone">Telefone</label>
        <input type="tel" id="telefone" placeholder="(00) 00000-0000" autocomplete="tel">
      </div>
      <div class="field">
        <label for="endereco">Cidade / Estado</label>
        <input type="text" id="endereco" placeholder="São Paulo, SP">
      </div>
    </div>

    <div class="field">
      <label for="objetivo">Objetivo Profissional</label>
      <textarea id="objetivo" placeholder="Descreva seu objetivo profissional..."></textarea>
    </div>

    <div class="field">
      <label for="escolaridade">Escolaridade</label>
      <textarea id="escolaridade" placeholder="Ex: Ensino Médio completo — Escola XYZ (2022)"></textarea>
    </div>

    <div class="field">
      <label for="cursos">Cursos e Certificações</label>
      <textarea id="cursos" placeholder="Ex: Curso de Excel — Udemy (2023)"></textarea>
    </div>

    <div class="field">
      <label for="experiencia">Experiência Profissional</label>
      <textarea id="experiencia" placeholder="Ex: Atendente — Loja ABC (jan/2022 – dez/2023)"></textarea>
    </div>

    <div class="field">
      <label for="habilidades">Habilidades</label>
      <textarea id="habilidades" placeholder="Ex: Pacote Office, Atendimento ao cliente, Trabalho em equipe"></textarea>
    </div>

    <button type="submit" class="btn-gerar">GERAR CURRÍCULO</button>

  </form>

  <!-- Preview do currículo -->
  <div id="curriculo">

    <div class="cv-header">
      <img id="previewFoto" src="" alt="Foto de perfil">
      <div class="cv-header-info">
        <h2 id="previewNome"></h2>
        <p id="previewContato"></p>
      </div>
    </div>

    <div class="secao" id="secao-objetivo">
      <h3>Objetivo</h3>
      <p id="previewObjetivo"></p>
    </div>

    <div class="secao" id="secao-escolaridade">
      <h3>Escolaridade</h3>
      <p id="previewEscolaridade"></p>
    </div>

    <div class="secao" id="secao-cursos">
      <h3>Cursos e Certificações</h3>
      <p id="previewCursos"></p>
    </div>

    <div class="secao" id="secao-experiencia">
      <h3>Experiência Profissional</h3>
      <p id="previewExperiencia"></p>
    </div>

    <div class="secao" id="secao-habilidades">
      <h3>Habilidades</h3>
      <p id="previewHabilidades"></p>
    </div>

    <div class="cv-actions">
      <button class="btn-acao btn-imprimir" onclick="imprimirCurriculo()">🖨️ Imprimir / Salvar PDF</button>
      <button class="btn-acao btn-limpar" onclick="limparTudo()">↩ Novo Currículo</button>
    </div>

  </div>
</div>

<script>
  const form = document.getElementById("formCurriculo");

  // ── VALIDAÇÃO ──────────────────────────────────────────────
  function validarEmail(v) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  }

  function setErro(fieldId, show) {
    const el = document.getElementById("field-" + fieldId);
    if (!el) return;
    el.classList.toggle("has-error", show);
  }

  function validarForm(dados) {
    let ok = true;

    if (!dados.nome.trim()) {
      setErro("nome", true);
      ok = false;
    } else {
      setErro("nome", false);
    }

    if (!dados.email.trim() || !validarEmail(dados.email)) {
      setErro("email", true);
      ok = false;
    } else {
      setErro("email", false);
    }

    return ok;
  }

  // ── SEÇÕES OPCIONAIS: mostra só se preenchidas ─────────────
  function toggleSecao(secaoId, previewId, valor) {
    const secao = document.getElementById(secaoId);
    const preview = document.getElementById(previewId);
    if (valor.trim()) {
      // textContent em vez de innerHTML — FIX de XSS
      preview.textContent = valor;
      secao.style.display = "block";
    } else {
      secao.style.display = "none";
    }
  }

  // ── SUBMIT ─────────────────────────────────────────────────
  form.addEventListener("submit", function(e) {
    e.preventDefault();

    const dados = {
      nome:         document.getElementById("nome").value,
      email:        document.getElementById("email").value,
      telefone:     document.getElementById("telefone").value,
      endereco:     document.getElementById("endereco").value,
      objetivo:     document.getElementById("objetivo").value,
      escolaridade: document.getElementById("escolaridade").value,
      cursos:       document.getElementById("cursos").value,
      experiencia:  document.getElementById("experiencia").value,
      habilidades:  document.getElementById("habilidades").value,
    };

    if (!validarForm(dados)) return;

    // Nome (textContent — sem XSS)
    document.getElementById("previewNome").textContent = dados.nome;

    // Contato: monta com DOM real em vez de innerHTML
    const contato = document.getElementById("previewContato");
    contato.innerHTML = ""; // limpa
    const linhas = [dados.email, dados.telefone, dados.endereco].filter(Boolean);
    linhas.forEach((linha, i) => {
      contato.appendChild(document.createTextNode(linha));
      if (i < linhas.length - 1) contato.appendChild(document.createElement("br"));
    });

    // Seções opcionais
    toggleSecao("secao-objetivo",     "previewObjetivo",     dados.objetivo);
    toggleSecao("secao-escolaridade", "previewEscolaridade", dados.escolaridade);
    toggleSecao("secao-cursos",       "previewCursos",       dados.cursos);
    toggleSecao("secao-experiencia",  "previewExperiencia",  dados.experiencia);
    toggleSecao("secao-habilidades",  "previewHabilidades",  dados.habilidades);

    // Foto — só exibe se o usuário enviou uma
    const fotoInput = document.getElementById("foto");
    const imgPreview = document.getElementById("previewFoto");

    if (fotoInput.files && fotoInput.files[0]) {
      const reader = new FileReader();
      reader.onload = function(ev) {
        imgPreview.src = ev.target.result;
        imgPreview.style.display = "block";
      };
      reader.readAsDataURL(fotoInput.files[0]);
    } else {
      imgPreview.style.display = "none";
      imgPreview.src = "";
    }

    // Exibe o currículo e scrolla até ele
    const curriculo = document.getElementById("curriculo");
    curriculo.style.display = "block";
    curriculo.scrollIntoView({ behavior: "smooth", block: "start" });
  });

  // ── IMPRIMIR / SALVAR PDF ────────────────────────────────
  // Abre nova janela só com o currículo — evita bugs de @media print
  function imprimirCurriculo() {
    const fotoEl  = document.getElementById("previewFoto");
    const nomeEl  = document.getElementById("previewNome");
    const contEl  = document.getElementById("previewContato");

    // Coleta seções visíveis
    const secoes = [
      { id: "secao-objetivo",     titulo: "Objetivo" },
      { id: "secao-escolaridade", titulo: "Escolaridade" },
      { id: "secao-cursos",       titulo: "Cursos e Certificações" },
      { id: "secao-experiencia",  titulo: "Experiência Profissional" },
      { id: "secao-habilidades",  titulo: "Habilidades" },
    ];

    let secoesHTML = "";
    secoes.forEach(s => {
      const secaoEl = document.getElementById(s.id);
      if (secaoEl && secaoEl.style.display !== "none") {
        const texto = secaoEl.querySelector("p").textContent;
        secoesHTML += `
          <div class="secao">
            <h3>${s.titulo}</h3>
            <p>${texto.replace(/\n/g, "<br>")}</p>
          </div>`;
      }
    });

    const fotoHTML = fotoEl.style.display !== "none"
      ? `<img src="${fotoEl.src}" alt="Foto">`
      : "";

    const win = window.open("", "_blank");
    win.document.write(`
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Currículo — ${nomeEl.textContent}</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'DM Sans',Arial,sans-serif; color:#111; background:#fff; padding:30px 40px; }
    .cv-header { display:flex; align-items:center; gap:22px; margin-bottom:24px; }
    img { width:100px; height:100px; border-radius:50%; object-fit:cover; border:3px solid #111; }
    h2 { font-family:'DM Serif Display',serif; font-size:1.6rem; margin-bottom:5px; }
    .cv-header p { font-size:0.88rem; color:#444; line-height:1.7; }
    .secao { margin-top:20px; }
    .secao h3 {
      font-family:'DM Serif Display',serif; font-size:0.95rem; text-transform:uppercase;
      letter-spacing:0.5px; color:#333; border-bottom:2px solid #f5c542;
      padding-bottom:4px; margin-bottom:8px;
    }
    .secao p { font-size:0.9rem; color:#333; line-height:1.7; }
    @media print {
      body { padding: 15px 20px; }
    }
  </style>
</head>
<body>
  <div class="cv-header">
    ${fotoHTML}
    <div>
      <h2>${nomeEl.textContent}</h2>
      <p>${contEl.innerHTML}</p>
    </div>
  </div>
  ${secoesHTML}
  <script>
    window.onload = function() {
      setTimeout(function() { window.print(); }, 400);
    };
  <\/script>
</body>
</html>`);
    win.document.close();
  }


  function limparTudo() {
    form.reset();
    document.getElementById("curriculo").style.display = "none";
    window.scrollTo({ top: 0, behavior: "smooth" });
  }
</script>
</body>
</html>
